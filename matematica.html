<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática | Niveles MINEDUC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .menu-container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 800;
            color: #0f172a;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }

        /* Estilo de los Niveles */
        .nivel-section {
            margin-bottom: 25px;
        }

        .nivel-header {
            background: #f1f5f9;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .nivel-header span {
            font-size: 1.2rem;
        }

        .game-list {
            padding: 15px 10px;
            display: grid;
            gap: 10px;
        }

        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: 0.2s;
        }

        .game-item:hover {
            background: #eff6ff;
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .badge-new {
            background: #dcfce7;
            color: #16a34a;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 99px;
            text-transform: uppercase;
        }

        .empty {
            font-weight: 400;
            font-size: 0.9rem;
            color: #94a3b8;
            font-style: italic;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="menu-container">
    <h1>Recursos de Matemática</h1>
    <p class="subtitle">Currículo Nacional Adaptado</p>

    <div class="nivel-section">
        <div class="nivel-header">
            <span>📗</span> Básica Elemental
        </div>
        <div class="game-list">
            <span class="empty">Próximamente ejercicios de sumas y restas interactivas...</span>
        </div>
    </div>

    <div class="nivel-section">
        <div class="nivel-header">
            <span>📘</span> Básica Superior
        </div>
        <div class="game-list">
            <a href="edades.html" class="game-item">
                1. Problemas de Edades (Ecuaciones)
                <span class="badge-new">Nuevo</span>
            </a>
        </div>
    </div>

    <div class="nivel-section">
        <div class="nivel-header">
            <span>📙</span> Bachillerato (BGU)
        </div>
        <div class="game-list">
            <span class="empty">Próximamente: Secciones Cónicas y Programación Lineal...</span>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Volver al Portal Principal</a>
</div>

</body>
</html>
